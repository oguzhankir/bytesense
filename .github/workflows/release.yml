name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-distributions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install build
      - run: python scripts/build_fingerprints.py
      - run: python -m build -o dist/
      - uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/

  build-rust-wheels:
    name: Rust wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install maturin
      - run: python scripts/build_fingerprints.py
      - run: maturin build --release -o dist/ --manifest-path rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}
          path: dist/

  publish:
    needs: [build-distributions, build-rust-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
