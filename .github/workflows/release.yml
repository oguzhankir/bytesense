# Publishes to PyPI when a GitHub Release is published (not draft).
# Configure trusted publishing on https://pypi.org/manage/project/bytesense/settings/publishing/
# for this repo and workflow file.

name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-sdist:
    name: Source distribution (maturin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: |
          python -m pip install --upgrade pip
          pip install maturin
      - run: python scripts/build_fingerprints.py
      - run: maturin sdist -o dist/
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-rust-wheels:
    name: Rust wheels · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install maturin
      - run: python scripts/build_fingerprints.py
      - run: maturin build --release -o dist/ --manifest-path rust/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: rust-wheels-${{ matrix.os }}
          path: dist/

  publish:
    needs: [build-sdist, build-rust-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/bytesense/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
