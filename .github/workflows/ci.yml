name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-pure-python:
    name: Pure Python · ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      # PEP 517 backend is maturin; a toolchain is required so editable installs can compile the extension.
      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Refreshes committed src/bytesense/data/fingerprints.py from ALL_ENCODINGS (must stay in sync).
      - name: Generate fingerprints
        run: python scripts/build_fingerprints.py

      - name: Fetch charset-normalizer benchmark corpus
        run: python scripts/fetch_cn_benchmark_samples.py

      - name: Lint (ruff)
        run: ruff check src/ tests/ benchmarks/

      - name: Type check (mypy)
        run: mypy src/bytesense

      - name: Unit tests + coverage
        run: pytest tests/ -v --cov=bytesense --cov-branch --cov-report=xml

      - name: Accuracy benchmarks (must pass)
        run: pytest benchmarks/test_bench_detection.py -k accuracy -v --no-header

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml

  test-with-rust:
    name: Rust extension · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      # maturin develop requires a venv (.venv, VIRTUAL_ENV, or CONDA_PREFIX); GHA's setup-python
      # does not create one, so installs go to the toolcache Python and maturin aborts.
      - name: Create venv and install dev dependencies
        shell: bash
        run: |
          set -eux
          python -m venv .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            VENVP="$GITHUB_WORKSPACE/.venv/Scripts/python.exe"
            echo "$GITHUB_WORKSPACE/.venv/Scripts" >> "$GITHUB_PATH"
          else
            VENVP="$GITHUB_WORKSPACE/.venv/bin/python"
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi
          "$VENVP" -m pip install --upgrade pip
          "$VENVP" -m pip install -e ".[dev]"

      - name: Build Rust extension
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            PY="$GITHUB_WORKSPACE/.venv/Scripts/python.exe"
          else
            PY="$GITHUB_WORKSPACE/.venv/bin/python"
          fi
          "$PY" -m maturin develop --release --manifest-path rust/Cargo.toml

      - name: Generate fingerprints
        run: python scripts/build_fingerprints.py

      - name: Fetch charset-normalizer benchmark corpus
        run: python scripts/fetch_cn_benchmark_samples.py

      - name: Unit tests
        run: pytest tests/ -v

      - name: Accuracy benchmarks
        run: pytest benchmarks/test_bench_detection.py -k accuracy -v --no-header

      - name: Rust speedup test
        run: pytest tests/test_rust.py -v

  benchmark:
    name: Speed benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Create venv, install project + maturin, build Rust extension
        shell: bash
        run: |
          set -eux
          python -m venv .venv
          VENVP="$GITHUB_WORKSPACE/.venv/bin/python"
          echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          "$VENVP" -m pip install --upgrade pip
          "$VENVP" -m pip install -e ".[dev]"
          "$VENVP" -m maturin develop --release --manifest-path rust/Cargo.toml

      - name: Generate fingerprints
        run: python scripts/build_fingerprints.py

      - name: Fetch charset-normalizer benchmark corpus
        run: python scripts/fetch_cn_benchmark_samples.py

      - name: Run speed benchmarks
        run: |
          mkdir -p benchmarks/results
          pytest benchmarks/test_bench_detection.py -v \
            -k "test_bench_bytesense_fast_path or test_bench_cn_fast_path or test_bench_bytesense_full or test_bench_cn_full or test_bench_chardet_full" \
            --benchmark-sort=mean \
            --benchmark-json=benchmarks/results/output.json \
            --no-header || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/
