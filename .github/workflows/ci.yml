name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-pure-python:
    name: Pure Python · ${{ matrix.python-version }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable, no Rust required)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Generate fingerprints
        run: python scripts/build_fingerprints.py

      - name: Fetch charset-normalizer benchmark corpus
        run: python scripts/fetch_cn_benchmark_samples.py

      - name: Lint (ruff)
        run: ruff check src/ tests/ benchmarks/

      - name: Type check (mypy)
        run: mypy src/bytesense

      - name: Unit tests + coverage
        run: pytest tests/ -v --cov=bytesense --cov-report=xml

      - name: Accuracy benchmarks (must pass)
        run: pytest benchmarks/test_bench_detection.py -k accuracy -v --no-header

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml

  test-with-rust:
    name: Rust extension · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build Rust extension
        run: maturin develop --release --manifest-path rust/Cargo.toml

      - name: Generate fingerprints
        run: python scripts/build_fingerprints.py

      - name: Fetch charset-normalizer benchmark corpus
        run: python scripts/fetch_cn_benchmark_samples.py

      - name: Unit tests
        run: pytest tests/ -v

      - name: Accuracy benchmarks
        run: pytest benchmarks/test_bench_detection.py -k accuracy -v --no-header

      - name: Rust speedup test
        run: pytest tests/test_rust.py -v

  benchmark:
    name: Speed benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Rust extension
        run: |
          python -m pip install --upgrade pip
          pip install maturin
          maturin develop --release --manifest-path rust/Cargo.toml

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Generate fingerprints
        run: python scripts/build_fingerprints.py

      - name: Fetch charset-normalizer benchmark corpus
        run: python scripts/fetch_cn_benchmark_samples.py

      - name: Run speed benchmarks
        run: |
          mkdir -p benchmarks/results
          pytest benchmarks/test_bench_detection.py -v \
            -k "test_bench_bytesense_fast_path or test_bench_cn_fast_path or test_bench_bytesense_full or test_bench_cn_full or test_bench_chardet_full" \
            --benchmark-sort=mean \
            --benchmark-json=benchmarks/results/output.json \
            --no-header || true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: benchmarks/results/
